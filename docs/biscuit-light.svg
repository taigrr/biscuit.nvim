<svg width="400" height="120" viewBox="0 0 400 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="biscuit-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A574"/>
      <stop offset="50%" style="stop-color:#C4956A"/>
      <stop offset="100%" style="stop-color:#B8865A"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Biscuit cookie shape -->
  <g filter="url(#shadow)">
    <!-- Main biscuit body - rounded rectangle cookie -->
    <rect x="15" y="25" width="70" height="70" rx="12" fill="url(#biscuit-gradient)"/>
    
    <!-- Cookie texture dots (like a digestive biscuit) -->
    <circle cx="35" cy="45" r="4" fill="#A67B50"/>
    <circle cx="55" cy="45" r="4" fill="#A67B50"/>
    <circle cx="35" cy="65" r="4" fill="#A67B50"/>
    <circle cx="55" cy="65" r="4" fill="#A67B50"/>
    <circle cx="45" cy="55" r="4" fill="#A67B50"/>
    <circle cx="65" cy="55" r="4" fill="#A67B50"/>
    <circle cx="25" cy="55" r="4" fill="#A67B50"/>
    <circle cx="45" cy="75" r="4" fill="#A67B50"/>
    <circle cx="45" cy="35" r="4" fill="#A67B50"/>
    
    <!-- Bite mark -->
    <circle cx="78" cy="32" r="12" fill="#ffffff"/>
  </g>
  
  <!-- Text -->
  <text x="105" y="72" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="42" font-weight="700" fill="#1a1b26">biscuit</text>
  <text x="295" y="72" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="42" font-weight="300" fill="#6b7280">.nvim</text>
</svg>
